name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6

      - name: Update localitas-go to latest
        run: |
          go get github.com/localitas/localitas-go@latest
          go mod tidy
        with:
          go-version-file: go.mod

      - name: Lint
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...

      - name: Test
        run: go test -v ./...

