services:
  web:
    image: ghcr.io/localitas/localitas-app-weather:latest
    command: ["serve", "--listen", ":8000", "--base-path", "/apps/ext/weather/"]
    ports:
      - "${APP_PORT:-9206}:8000"
    environment:
      - CORE_URL=http://host.docker.internal:8090
      - LOCALITAS_API_TOKEN=${LOCALITAS_API_TOKEN:-}
    labels:
      localitas.app: "true"
    restart: unless-stopped
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
